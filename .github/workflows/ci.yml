name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd janus-mcp
          python -m pip install -e ".[ai,dev]"

      - name: Run tests
        run: |
          cd janus-mcp
          python -m pytest tests/ -q \
            --ignore=tests/test_ui_expand.py \
            --ignore=tests/test_ui_comments.py \
            --ignore=tests/test_ui_diff.py \
            --ignore=tests/test_ui_smoke.py \
            --ignore=tests/test_ui_status.py
